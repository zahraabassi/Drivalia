<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Table</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --pri:#C8017D; --pri-d:#9E0062; --pri-l:#FCE4F3;
  --gry:#F5F6FA; --brd:#E0E3EB;
  --txt:#2D2D4E; --mut:#8A8AAA; --wht:#FFFFFF;
  --row-alt:#FAFBFD;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --sh-lg:0 8px 32px rgba(0,0,0,.13);
  --r:10px; --r-s:6px;
  --font:'Inter',system-ui,sans-serif;
}

html,body{
  height:100%;
  font-family:var(--font);
  color:var(--txt);
  background:transparent;
  font-size:14px;
}

/* TABLE CARD */
.drv{
  background:var(--wht);
  border-radius:var(--r);
  border:1px solid var(--brd);
  box-shadow:var(--sh);
  overflow:hidden;
}

/* TOOLBAR */
.drv-bar{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--brd);flex-wrap:wrap;}

.srch-wrap{position:relative;flex:1;max-width:340px;}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--mut);}
.drv-srch{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--brd);border-radius:var(--r-s);background:var(--gry);}
.drv-btn{padding:7px 12px;border:1px solid var(--brd);border-radius:var(--r-s);background:var(--wht);cursor:pointer;font-size:13px;}

/* TABLE */
.tbl-wrap{overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{background:var(--gry);border-bottom:2px solid var(--brd);}
.th-in{display:flex;align-items:center;padding:9px 13px;}
.th-lbl{font-weight:600;font-size:11.5px;text-transform:uppercase;flex:1;cursor:pointer;}
td{padding:9px 13px;border-bottom:1px solid var(--brd);}
tr:hover td{background:#f0f4ff;}
tr.alt td{background:var(--row-alt);}

/* BADGES */
.badge{padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;}
.b-open{background:#FEF3E2;color:#B45309;}

/* FOOTER */
.drv-foot{display:flex;justify-content:space-between;padding:11px 14px;border-top:1px solid var(--brd);background:var(--gry);}
</style>
</head>

<body>

<div id="root"></div>

<script>
const DATASETS={accidents:[
{"Group Name":"České dráhy, a.s.","Registration":"8AT1699","Make":"SKODA","Model":"Karoq","Damage No":"240711055W","Date":"2024-07-11","State":"Open","Description":"Damage found"},
{"Group Name":"synlab czech s.r.o.","Registration":"9AD0763","Make":"SKODA","Model":"Fabia","Damage No":"240711084P","Date":"2024-07-11","State":"Open","Description":"Inspection damage"},
{"Group Name":"Samsung Electronics","Registration":"1ABR913","Make":"SKODA","Model":"Octavia","Damage No":"240711004A","Date":"2024-07-11","State":"Open","Description":"Unknown vehicle damage"}
]};

function createTable(el,data){
  const cols=Object.keys(data[0]);
  el.innerHTML=`
    <div class="drv">
      <div class="drv-bar">
        <div class="srch-wrap">
          <input class="drv-srch" placeholder="Search...">
        </div>
      </div>

      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>${cols.map(c=>`<th><div class="th-in"><span class="th-lbl">${c}</span></div></th>`).join('')}</tr>
          </thead>
          <tbody>
            ${data.map((r,i)=>`
              <tr class="${i%2?'alt':''}">
                ${cols.map(c=>`<td>${r[c]}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="drv-foot">
        <span>${data.length} rows</span>
      </div>
    </div>
  `;
}

createTable(document.getElementById('root'),DATASETS.accidents);
</script>

</body>
</html>
